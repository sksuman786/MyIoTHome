version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-myhome_db}
      POSTGRES_USER: ${DB_USER:-myhome_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-myhome_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-myhome_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: gunicorn myhome.wsgi:application --bind 0.0.0.0:8000 --workers 4
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      DEBUG: "False"
      ALLOWED_HOSTS: "*"
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${DB_NAME:-myhome_db}
      DB_USER: ${DB_USER:-myhome_user}
      DB_PASSWORD: ${DB_PASSWORD:-myhome_password}
      DB_HOST: db
      DB_PORT: 5432
      SECRET_KEY: ${SECRET_KEY:-your-secret-key}
    depends_on:
      db:
        condition: service_healthy

  daphne:
    build: .
    command: daphne -b 0.0.0.0 -p 8001 myhome.asgi:application
    volumes:
      - .:/app
    ports:
      - "8001:8001"
    environment:
      DEBUG: "False"
      ALLOWED_HOSTS: "*"
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${DB_NAME:-myhome_db}
      DB_USER: ${DB_USER:-myhome_user}
      DB_PASSWORD: ${DB_PASSWORD:-myhome_password}
      DB_HOST: db
      DB_PORT: 5432
      SECRET_KEY: ${SECRET_KEY:-your-secret-key}
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - web
      # daphne removed; nginx proxies only to web

volumes:
  postgres_data:
  static_volume:
  media_volume:
