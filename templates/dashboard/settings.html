{% extends 'base.html' %}

{% block title %}Settings - MyHome IoT{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <h1 class="h2 mb-4"><i class="fas fa-sliders-h me-3"></i>Settings</h1>
    
    <div class="row">
        <div class="col-md-3">
            <div class="list-group">
                <button class="list-group-item list-group-item-action active" data-bs-toggle="list" href="#account">Account</button>
                <button class="list-group-item list-group-item-action" data-bs-toggle="list" href="#notifications">Notifications</button>
                <button class="list-group-item list-group-item-action" data-bs-toggle="list" href="#security">Security</button>
                <button class="list-group-item list-group-item-action" data-bs-toggle="list" href="#preferences">Preferences</button>
            </div>
        </div>
        
        <div class="col-md-9">
            <div class="tab-content">
                <!-- Account Settings -->
                <div class="tab-pane fade show active" id="account">
                    <div class="card shadow-sm">
                        <div class="card-header bg-dark text-white">
                            <h5 class="mb-0">Account Settings</h5>
                        </div>
                        <div class="card-body">
                            <form>
                                <div class="mb-3">
                                    <label class="form-label">Username</label>
                                    <input type="text" class="form-control" value="{{ user.username }}" disabled>
                                </div>
                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label class="form-label">First Name</label>
                                        <input type="text" class="form-control" value="{{ user.first_name }}">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">Last Name</label>
                                        <input type="text" class="form-control" value="{{ user.last_name }}">
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Email</label>
                                    <input type="email" class="form-control" value="{{ user.email }}">
                                </div>
                                <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Changes</button>
                            </form>
                        </div>
                    </div>
                </div>
                
                <!-- Notification Settings -->
                <div class="tab-pane fade" id="notifications">
                    <div class="card shadow-sm">
                        <div class="card-header bg-dark text-white">
                            <h5 class="mb-0">Notification Preferences</h5>
                        </div>
                        <div class="card-body">
                            <div class="form-check mb-3">
                                <input class="form-check-input" type="checkbox" id="deviceOffline" checked>
                                <label class="form-check-label" for="deviceOffline">
                                    Device Offline Alerts
                                </label>
                            </div>
                            <div class="form-check mb-3">
                                <input class="form-check-input" type="checkbox" id="firmwareUpdates" checked>
                                <label class="form-check-label" for="firmwareUpdates">
                                    Firmware Update Notifications
                                </label>
                            </div>
                            <div class="form-check mb-3">
                                <input class="form-check-input" type="checkbox" id="applianceControl">
                                <label class="form-check-label" for="applianceControl">
                                    Appliance Control Notifications
                                </label>
                            </div>
                            <button class="btn btn-primary"><i class="fas fa-save"></i> Save Preferences</button>
                        </div>
                    </div>
                </div>
                
                <!-- Security Settings -->
                <div class="tab-pane fade" id="security">
                    <div class="card shadow-sm">
                        <div class="card-header bg-dark text-white">
                            <h5 class="mb-0">Security Settings</h5>
                        </div>
                        <div class="card-body">
                            <div class="mb-4">
                                <h6 class="mb-3">Change Password</h6>
                                <form>
                                    <div class="mb-3">
                                        <label class="form-label">Current Password</label>
                                        <input type="password" class="form-control">
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">New Password</label>
                                        <input type="password" class="form-control">
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Confirm Password</label>
                                        <input type="password" class="form-control">
                                    </div>
                                    <button type="submit" class="btn btn-warning"><i class="fas fa-lock"></i> Change Password</button>
                                </form>
                            </div>
                            
                            <hr>
                            
                            <div>
                                <h6 class="mb-3">Two-Factor Authentication</h6>
                                <p class="text-muted">Add an extra layer of security to your account.</p>
                                <button class="btn btn-success"><i class="fas fa-shield-alt"></i> Enable 2FA</button>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Preferences -->
                <div class="tab-pane fade" id="preferences">
                    <div class="card shadow-sm">
                        <div class="card-header bg-dark text-white">
                            <h5 class="mb-0">User Preferences</h5>
                        </div>
                        <div class="card-body">
                            <div class="mb-3">
                                <label class="form-label">Theme</label>
                                <select class="form-select">
                                    <option value="light">Light Mode</option>
                                    <option value="dark">Dark Mode</option>
                                    <option value="auto">Auto (System)</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Language</label>
                                <select class="form-select">
                                    <option value="en">English</option>
                                    <option value="es">Spanish</option>
                                    <option value="fr">French</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Timezone</label>
                                <input type="text" class="form-control" value="UTC">
                            </div>
                            <button class="btn btn-primary"><i class="fas fa-save"></i> Save Preferences</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
